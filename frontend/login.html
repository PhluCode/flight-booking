<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AERIS — Log In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="nav-slot"></div>

  <main>
    <div class="auth-wrap">
      <!-- Left brand panel -->
      <aside class="auth-aside">
        <a href="index.html" class="brand"><span class="brand-mark" id="asideMark"></span><span>AERIS</span></a>
        <div>
          <h2 data-i18n="auth.aside.title"></h2>
          <p data-i18n="auth.aside.sub"></p>
          <ul class="auth-points">
            <li><span class="tick" id="t1"></span><span data-i18n="auth.aside.p1"></span></li>
            <li><span class="tick" id="t2"></span><span data-i18n="auth.aside.p2"></span></li>
            <li><span class="tick" id="t3"></span><span data-i18n="auth.aside.p3"></span></li>
          </ul>
        </div>
        <div class="plane-deco" id="asidePlane"></div>
      </aside>

      <!-- Right form panel -->
      <section class="auth-panel">
        <div class="auth-card">
          <div class="auth-switch">
            <button data-mode="login" class="active" data-i18n="auth.login.tab"></button>
            <button data-mode="register" data-i18n="auth.register.tab"></button>
          </div>

          <h1 id="authTitle" data-i18n="auth.login.title"></h1>
          <p class="lede" id="authLede" data-i18n="auth.login.lede"></p>

          <form id="authForm" novalidate>
            <div class="form-field" id="nameField" style="display:none">
              <label data-i18n="auth.name"></label>
              <input class="input" id="name" data-i18n-ph="auth.name.ph" />
              <div class="field-error" data-err="name"></div>
            </div>

            <div class="form-field">
              <label data-i18n="auth.email"></label>
              <input class="input" id="email" type="email" data-i18n-ph="auth.email.ph" />
              <div class="field-error" data-err="email"></div>
            </div>

            <div class="form-field">
              <label data-i18n="auth.password"></label>
              <div class="input-group">
                <input class="input" id="password" type="password" data-i18n-ph="auth.password.ph" />
                <button type="button" class="toggle-pass" data-target="password" aria-label="show"></button>
              </div>
              <div class="field-error" data-err="password"></div>
            </div>

            <div class="form-field" id="confirmField" style="display:none">
              <label data-i18n="auth.confirm"></label>
              <div class="input-group">
                <input class="input" id="confirm" type="password" data-i18n-ph="auth.confirm.ph" />
                <button type="button" class="toggle-pass" data-target="confirm" aria-label="show"></button>
              </div>
              <div class="field-error" data-err="confirm"></div>
            </div>

            <div class="form-row" id="loginRow">
              <label><input type="checkbox" id="remember" /> <span data-i18n="auth.remember"></span></label>
              <a href="#" data-i18n="auth.forgot"></a>
            </div>

            <div class="form-field" id="agreeRow" style="display:none">
              <label style="display:flex;gap:9px;align-items:center;font-size:.88rem">
                <input type="checkbox" id="agree" /> <span data-i18n="auth.agree"></span>
              </label>
              <div class="field-error" data-err="agree"></div>
            </div>

            <button type="submit" class="btn btn-dark btn-block btn-lg" id="submitBtn" data-i18n="auth.login.btn"></button>
          </form>

          <div class="divider"><span data-i18n="auth.or"></span></div>
          <div class="social-row">
            <button class="btn btn-light social-btn" id="googleBtn"></button>
            <button class="btn btn-light social-btn" id="fbBtn"></button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="js/icons.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
