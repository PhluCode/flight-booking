<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AERIS — Where to Fly?</title>
  <meta name="description" content="Find countless flight options & deals to destinations around the world." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="nav-slot"></div>

  <main>
    <!-- HERO — floating "welcome on board" panel -->
    <section class="hero">
      <div class="container">
        <div class="hero-panel">
          <div class="hero-panel-top stagger">
            <span class="hero-eyebrow"><span data-i18n="hero.cap.fleet"></span></span>
            <span class="hero-quick" id="heroQuick"></span>
          </div>

          <h1 class="hero-welcome stagger" data-i18n="hero.welcome"></h1>
          <p class="hero-lede stagger" data-i18n="hero.sub"></p>

          <div class="sky-stage stagger">
            <figure class="sky-pill">
              <img src="assets/aeris-jet.jpg" alt="AERIS private jet cruising above mountain ranges"
                   width="1024" height="683" fetchpriority="high" />
              <span class="hero-photo-grain" aria-hidden="true"></span>
              <span class="hero-photo-sheen" aria-hidden="true"></span>
            </figure>
          </div>

          <div class="hero-booking stagger" id="book">
            <div id="booking-slot"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- DESTINATIONS -->
    <section class="section">
      <div class="container">
        <div class="row" style="justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:14px; margin-bottom:30px">
          <div>
            <span class="eyebrow" data-i18n="dest.title"></span>
            <h2 class="section-title" data-i18n="dest.title"></h2>
            <p class="section-sub" data-i18n="dest.sub"></p>
          </div>
          <a href="flights.html" class="btn btn-light" data-i18n="dest.viewall"></a>
        </div>
        <div class="cards-grid" id="destGrid"></div>
      </div>
    </section>

    <!-- WHY US -->
    <section class="section" style="background:var(--bg-soft)">
      <div class="container">
        <div class="center" style="margin-bottom:36px">
          <h2 class="section-title" data-i18n="why.title"></h2>
          <p class="section-sub" style="margin:0 auto" data-i18n="why.sub"></p>
        </div>
        <div class="info-tiles" id="whyGrid"></div>
      </div>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script src="js/icons.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
