<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AERIS — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="nav-slot"></div>

  <main class="container">
    <div class="page-head">
      <div class="breadcrumb"><a href="index.html" data-i18n="nav.home"></a><span>/</span><span data-i18n="profile.crumb"></span></div>
      <h1 data-i18n="profile.title"></h1>
    </div>

    <div class="profile-layout">
      <!-- SIDE -->
      <aside class="profile-side">
        <div class="profile-id">
          <div class="profile-avatar" id="pAvatar">U</div>
          <h3 id="pName">—</h3>
          <div class="muted" id="pEmail" style="font-size:.85rem">—</div>
        </div>
        <ul class="side-nav" id="sideNav"></ul>
      </aside>

      <!-- MAIN -->
      <section>

        <!-- ── Overview ── -->
        <div id="secOverview">
          <div class="panel">
            <div class="info-tiles">
              <div class="info-tile"><div class="ic" id="ic1"></div><div class="num" id="tileTrips">—</div><div class="lbl" data-i18n="tile.trips"></div></div>
              <div class="info-tile"><div class="ic" id="ic2"></div><div class="num" id="tileUpcoming">—</div><div class="lbl" data-i18n="tile.upcoming"></div></div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h2>Recommended for You</h2>
              <span class="muted" style="font-size:.85rem">Based on similar travellers</span>
            </div>
            <div id="recList" style="display:flex;gap:12px;flex-wrap:wrap;padding-top:4px">
              <span class="muted">Loading...</span>
            </div>
          </div>
        </div>

        <!-- ── Personal Information ── -->
        <div id="secPersonal" hidden>
          <div class="panel">
            <div class="panel-head">
              <h2 data-i18n="panel.personal"></h2>
              <button class="btn btn-light" id="editBtn" data-i18n="panel.edit"></button>
            </div>
            <form id="profileForm">
              <div class="grid-2">
                <div class="form-field"><label data-i18n="f.firstname"></label><input class="input" id="firstName" disabled /></div>
                <div class="form-field"><label data-i18n="f.lastname"></label><input class="input" id="lastName" disabled /></div>
                <div class="form-field"><label data-i18n="f.email"></label><input class="input" id="pfEmail" disabled /></div>
                <div class="form-field"><label data-i18n="f.phone"></label><input class="input" id="phone" disabled /></div>
                <div class="form-field"><label data-i18n="f.nationality"></label><input class="input" id="nationality" list="nationalityList" autocomplete="off" disabled /></div>
                <div class="form-field"><label data-i18n="f.passport"></label><input class="input" id="passport" disabled /></div>
                <div class="form-field"><label data-i18n="f.dob"></label><input class="input" id="dob" type="date" disabled /></div>
                <div class="form-field"><label data-i18n="f.address"></label><input class="input" id="address" disabled /></div>
              </div>
              <button type="submit" class="btn btn-dark" id="saveBtn" style="display:none;margin-top:8px" data-i18n="panel.save"></button>
            </form>
          </div>
        </div>

        <!-- ── Payment ── -->
        <div id="secPayment" hidden>
          <div class="panel">
            <div class="panel-head">
              <h2 data-i18n="side.payment"></h2>
            </div>
            <div class="grid-2" style="margin-top:8px">
              <div class="form-field">
                <label>Card Number</label>
                <input id="cardNumber" class="input" placeholder="•••• •••• •••• ••••" maxlength="19" inputmode="numeric" />
              </div>
              <div class="form-field">
                <label>Cardholder Name</label>
                <input id="cardHolder" class="input" placeholder="Name on card" />
              </div>
              <div class="form-field">
                <label>Expiry Date</label>
                <input id="cardExp" class="input" placeholder="MM / YY" maxlength="7" inputmode="numeric" />
                <span id="cardExpErr" style="color:#e53e3e;font-size:.75rem;display:none">Invalid month (01–12)</span>
              </div>

            </div>
            <button class="btn btn-dark" id="saveCardBtn" style="margin-top:12px">Save Card</button>
          </div>
        </div>

      </section>
    </div>
  </main>

  <div id="footer-slot"></div>

  <datalist id="nationalityList">
    <option value="Afghan"><option value="Albanian"><option value="Algerian"><option value="American">
    <option value="Andorran"><option value="Angolan"><option value="Argentine"><option value="Armenian">
    <option value="Australian"><option value="Austrian"><option value="Azerbaijani"><option value="Bahamian">
    <option value="Bahraini"><option value="Bangladeshi"><option value="Belarusian"><option value="Belgian">
    <option value="Belizean"><option value="Bhutanese"><option value="Bolivian"><option value="Bosnian">
    <option value="Brazilian"><option value="British"><option value="Bruneian"><option value="Bulgarian">
    <option value="Cambodian"><option value="Cameroonian"><option value="Canadian"><option value="Chilean">
    <option value="Chinese"><option value="Colombian"><option value="Costa Rican"><option value="Croatian">
    <option value="Cuban"><option value="Cypriot"><option value="Czech"><option value="Danish">
    <option value="Dutch"><option value="Ecuadorian"><option value="Egyptian"><option value="Emirati">
    <option value="Estonian"><option value="Ethiopian"><option value="Filipino"><option value="Finnish">
    <option value="French"><option value="Georgian"><option value="German"><option value="Ghanaian">
    <option value="Greek"><option value="Guatemalan"><option value="Honduran"><option value="Hungarian">
    <option value="Icelandic"><option value="Indian"><option value="Indonesian"><option value="Iranian">
    <option value="Iraqi"><option value="Irish"><option value="Israeli"><option value="Italian">
    <option value="Ivorian"><option value="Jamaican"><option value="Japanese"><option value="Jordanian">
    <option value="Kazakhstani"><option value="Kenyan"><option value="Kuwaiti"><option value="Lao">
    <option value="Latvian"><option value="Lebanese"><option value="Libyan"><option value="Lithuanian">
    <option value="Luxembourgish"><option value="Malaysian"><option value="Maldivian"><option value="Maltese">
    <option value="Mauritanian"><option value="Mauritian"><option value="Mexican"><option value="Moldovan">
    <option value="Mongolian"><option value="Moroccan"><option value="Mozambican"><option value="Namibian">
    <option value="Nepalese"><option value="New Zealander"><option value="Nicaraguan"><option value="Nigerian">
    <option value="Norwegian"><option value="Omani"><option value="Pakistani"><option value="Palestinian">
    <option value="Panamanian"><option value="Paraguayan"><option value="Peruvian"><option value="Polish">
    <option value="Portuguese"><option value="Qatari"><option value="Romanian"><option value="Russian">
    <option value="Rwandan"><option value="Saudi"><option value="Senegalese"><option value="Serbian">
    <option value="Singaporean"><option value="Slovak"><option value="Slovenian"><option value="Somali">
    <option value="South African"><option value="South Korean"><option value="Spanish"><option value="Sri Lankan">
    <option value="Sudanese"><option value="Swedish"><option value="Swiss"><option value="Syrian">
    <option value="Taiwanese"><option value="Tajik"><option value="Tanzanian"><option value="Thai">
    <option value="Tunisian"><option value="Turkish"><option value="Ukrainian"><option value="Uruguayan">
    <option value="Uzbek"><option value="Venezuelan"><option value="Vietnamese"><option value="Yemeni">
    <option value="Zambian"><option value="Zimbabwean">
  </datalist>

  <script src="js/icons.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
